name: Raccolta Traffico Soccorso

on:
  schedule:
    # 5 rilevazioni/giorno: mattina, metà mattina, pranzo, pomeriggio, sera (ora IT ≈ UTC+1/2)
    - cron: '0 6 * * *'   # 07:00 IT – picco mattutino
    - cron: '0 9 * * *'   # 10:00 IT – post-rush
    - cron: '0 11 * * *'  # 12:00 IT – ora di pranzo
    - cron: '0 15 * * *'  # 16:00 IT – pomeriggio
    - cron: '0 17 * * *'  # 18:00 IT – picco serale
  workflow_dispatch:  # permette run manuale dalla UI GitHub

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Raccogli dati traffico
        env:
          TOMTOM_API_KEY:    ${{ secrets.TOMTOM_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python collect_traffico_soccorso.py
