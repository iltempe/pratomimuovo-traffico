name: Raccolta Traffico Soccorso

on:
  schedule:
    # Orari italiani (CEST = UTC+2, ora legale)
    - cron: '0 5 * * *'   # 07:00 IT
    - cron: '0 8 * * *'   # 10:00 IT
    - cron: '0 10 * * *'  # 12:00 IT
    - cron: '0 14 * * *'  # 16:00 IT
    - cron: '0 16 * * *'  # 18:00 IT
    - cron: '0 17 * * *'  # 19:00 IT
    - cron: '0 18 * * *'  # 20:00 IT
    - cron: '0 21 * * *'  # 23:00 IT
  workflow_dispatch:  # permette run manuale dalla UI GitHub

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Raccogli dati traffico
        env:
          TOMTOM_API_KEY:    ${{ secrets.TOMTOM_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python collect_traffico_soccorso.py
