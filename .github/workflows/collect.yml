name: Raccolta Traffico Soccorso

on:
  schedule:
    # Ogni 15 minuti (GitHub Actions minimo 5 min)
    - cron: '*/15 * * * *'
  workflow_dispatch:  # permette run manuale dalla UI GitHub

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Raccogli dati traffico
        env:
          TOMTOM_API_KEY:    ${{ secrets.TOMTOM_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python collect_traffico_soccorso.py
