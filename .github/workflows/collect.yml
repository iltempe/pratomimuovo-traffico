name: Raccolta Traffico Soccorso

on:
  schedule:
    - cron: '0 * * * *'   # ogni ora – l'orario italiano è gestito dal job
  workflow_dispatch:

jobs:
  check-ora:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.ora.outputs.should_run }}
    steps:
      - name: Controlla orario italiano
        id: ora
        run: |
          python3 - <<'EOF'
          from datetime import datetime
          import zoneinfo, os
          ora_it = datetime.now(zoneinfo.ZoneInfo('Europe/Rome')).hour
          orari  = [7, 10, 12, 16, 18, 19, 20, 23]
          result = 'true' if ora_it in orari else 'false'
          print(f"Ora italiana: {ora_it}:00  →  should_run={result}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"should_run={result}\n")
          EOF

  collect:
    needs: check-ora
    if: needs.check-ora.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Raccogli dati traffico
        env:
          TOMTOM_API_KEY:    ${{ secrets.TOMTOM_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python collect_traffico_soccorso.py
